<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Next Decade - Audiobook</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 18px;
            line-height: 1.8;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 15px;
            color: #eee;
            background: #1a1a2e;
        }
        h1 {
            font-size: 2em;
            text-align: center;
            margin-bottom: 10px;
            color: #fff;
        }
        h2 {
            font-size: 1.2em;
            text-align: center;
            font-weight: normal;
            color: #aaa;
            margin-bottom: 30px;
        }
        
        .player-container {
            background: #16213e;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px solid #0f3460;
        }
        .now-playing {
            text-align: center;
            margin-bottom: 20px;
        }
        .now-playing h3 {
            color: #e94560;
            font-size: 1.3em;
            margin-bottom: 5px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .btn {
            background: #0f3460;
            border: 2px solid #e94560;
            color: #e94560;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #e94560;
            color: #fff;
        }
        .btn-play {
            font-size: 1.2em;
            padding: 15px 35px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress-container {
            margin-bottom: 15px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #0f3460;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: #e94560;
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 0.85em;
            margin-top: 5px;
        }
        
        .chapter-list {
            background: #16213e;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #0f3460;
        }
        .chapter-list h3 {
            color: #e94560;
            margin-bottom: 15px;
            text-align: center;
        }
        .chapter-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chapter-item:hover {
            background: #0f3460;
        }
        .chapter-item.active {
            background: #e94560;
            color: #fff;
        }
        .chapter-title {
            font-weight: bold;
        }
        .chapter-time {
            color: #888;
            font-size: 0.9em;
        }
        .chapter-item.active .chapter-time {
            color: #fff;
        }
        
        .nav {
            text-align: center;
            margin: 30px 0;
        }
        .nav a {
            color: #e94560;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #e94560;
            border-radius: 5px;
            margin: 0 10px;
        }
        .nav a:hover {
            background: #e94560;
            color: #fff;
        }
        
        audio {
            width: 100%;
            margin: 10px 0;
        }
        
        @media (max-width: 600px) {
            body { font-size: 16px; padding: 15px 10px; }
            h1 { font-size: 1.5em; }
            .controls { gap: 10px; }
            .btn { padding: 10px 18px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <h1>The Next Decade</h1>
    <h2>Audiobook Player</h2>
    
    <div class="nav">
        <a href="index.html">📖 Read Book</a>
    </div>
    
    <div class="player-container">
        <div class="now-playing">
            <h3 id="current-title">Select a part to start</h3>
        </div>
        
        <!-- Native audio player for compatibility -->
        <audio id="audio-player" controls preload="none">
            <source src="" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        
        <div class="controls">
            <button class="btn" id="prev-btn" onclick="playPrevious()">⏮ Previous</button>
            <button class="btn" id="next-btn" onclick="playNext()">Next ⏭</button>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar" onclick="seek(event)">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="time-display">
                <span id="current-time">0:00</span>
                <span id="total-time">0:00</span>
            </div>
        </div>
    </div>
    
    <div class="chapter-list">
        <h3>Audiobook Parts</h3>
        <div id="chapters"></div>
    </div>

    <script>
        const PARTS = [
            { title: "Part 1: Introduction & Early Chapters", file: "The_Next_Decade_Part1.mp3" },
            { title: "Part 2: Middle Chapters", file: "The_Next_Decade_Part2.mp3" },
            { title: "Part 3: Later Chapters", file: "The_Next_Decade_Part3.mp3" },
            { title: "Part 4: Conclusion & Appendices", file: "The_Next_Decade_Part4.mp3" }
        ];

        let currentPart = 0;
        const audio = document.getElementById('audio-player');

        function init() {
            renderParts();
            setupAudioEvents();
            loadPart(0);
        }

        function renderParts() {
            const container = document.getElementById('chapters');
            container.innerHTML = PARTS.map((part, i) => `
                <div class="chapter-item ${i === 0 ? 'active' : ''}" data-index="${i}" onclick="selectPart(${i})">
                    <span class="chapter-title">${part.title}</span>
                </div>
            `).join('');
        }

        function setupAudioEvents() {
            audio.addEventListener('ended', () => {
                playNext();
            });
            
            audio.addEventListener('timeupdate', () => {
                updateProgress();
            });
            
            audio.addEventListener('loadedmetadata', () => {
                document.getElementById('total-time').textContent = formatTime(audio.duration);
            });
        }

        function loadPart(index) {
            currentPart = index;
            const part = PARTS[index];
            
            audio.src = part.file;
            audio.load();
            
            document.getElementById('current-title').textContent = part.title;
            
            document.querySelectorAll('.chapter-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
            
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('current-time').textContent = '0:00';
            document.getElementById('total-time').textContent = '0:00';
        }

        function selectPart(index) {
            loadPart(index);
            audio.play();
        }

        function playNext() {
            if (currentPart < PARTS.length - 1) {
                loadPart(currentPart + 1);
                audio.play();
            }
        }

        function playPrevious() {
            if (currentPart > 0) {
                loadPart(currentPart - 1);
                audio.play();
            }
        }

        function updateProgress() {
            const current = audio.currentTime;
            const duration = audio.duration || 0;
            
            document.getElementById('current-time').textContent = formatTime(current);
            
            const percent = duration > 0 ? (current / duration) * 100 : 0;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function seek(event) {
            const rect = document.getElementById('progress-bar').getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            const time = percent * audio.duration;
            audio.currentTime = time;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowRight') playNext();
            if (e.code === 'ArrowLeft') playPrevious();
        });

        init();
    </script>
</body>
</html>
